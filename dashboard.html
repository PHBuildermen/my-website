<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Lite site - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Studio Lite site</div>
        <div class="settings-dropdown">
            <button class="icon-btn" onclick="toggleDropdown()">
                <i class="fas fa-cog"></i>
            </button>
            <div id="myDropdown" class="dropdown-content">
                <button onclick="openProfile()"><i class="fas fa-user"></i> Profile</button>
                <button onclick="logout()" style="color: red;"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Post Creator -->
        <div class="creator-card">
            <h3>Create New Post</h3>
            <div class="input-group">
                <input type="text" id="postTitle" placeholder="Post Title">
            </div>
            <div class="input-group">
                <input type="text" id="postLink" placeholder="Paste Link (URL)">
            </div>
            <div class="input-group">
                <textarea id="postDesc" rows="3" placeholder="Description"></textarea>
            </div>
            
            <div class="custom-controls">
                <select id="fontSelect">
                    <option value="'Inter', sans-serif">Default Font</option>
                    <option value="'Poppins', sans-serif">Modern Poppins</option>
                    <option value="'Roboto Mono', monospace">Tech Mono</option>
                </select>
                <input type="color" id="colorSelect" value="#333333" title="Text Color" style="width: 50px; padding: 2px;">
            </div>

            <button class="btn-primary" onclick="submitPost()">Post to Feed</button>
        </div>

        <div id="postFeed"></div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3>Account Profile</h3>
            <img id="profilePreview" src="https://via.placeholder.com/100" class="author-pic" style="width: 100px; height: 100px; margin-bottom: 10px;">
            <p><strong id="profName">Username</strong></p>
            <input type="file" id="imageInput" accept="image/*" style="font-size: 0.7rem; margin-bottom: 20px;">
            <button class="btn-primary" onclick="closeProfile()">Close</button>
        </div>
    </div>

    <script>
        const currentUser = localStorage.getItem('username');
        if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'index.html';

        // Dropdown Logic
        function toggleDropdown() { document.getElementById("myDropdown").style.display = 
            document.getElementById("myDropdown").style.display === "block" ? "none" : "block"; }

        // Profile & Image Logic
        function openProfile() {
            document.getElementById('profileModal').style.display = 'flex';
            document.getElementById('profName').innerText = currentUser;
            const savedImg = localStorage.getItem('profileImg');
            if(savedImg) document.getElementById('profilePreview').src = savedImg;
        }

        function closeProfile() { document.getElementById('profileModal').style.display = 'none'; }

        document.getElementById('imageInput').addEventListener('change', function() {
            const reader = new FileReader();
            reader.onload = function() {
                localStorage.setItem('profileImg', reader.result);
                document.getElementById('profilePreview').src = reader.result;
            }
            reader.readAsDataURL(this.files[0]);
        });

        // Posting Logic
        function submitPost() {
            const title = document.getElementById('postTitle').value;
            const link = document.getElementById('postLink').value;
            const desc = document.getElementById('postDesc').value;
            const font = document.getElementById('fontSelect').value;
            const color = document.getElementById('colorSelect').value;
            const date = new Date().toLocaleString();

            if(!title || !link) return alert("Title and Link are required!");

            const post = { title, link, desc, font, color, date, author: currentUser, authorImg: localStorage.getItem('profileImg') };
            const posts = JSON.parse(localStorage.getItem('litePosts')) || [];
            posts.push(post);
            localStorage.setItem('litePosts', JSON.stringify(posts));
            
            location.reload(); // Refresh to show post
        }

        function renderPosts() {
            const feed = document.getElementById('postFeed');
            const posts = JSON.parse(localStorage.getItem('litePosts')) || [];
            feed.innerHTML = posts.reverse().map(p => `
                <div class="post-card">
                    <div class="post-header">
                        <img src="${p.authorImg || 'https://via.placeholder.com/40'}" class="author-pic">
                        <div class="author-info">
                            <h4>${p.author}</h4>
                            <span><i class="far fa-calendar-alt"></i> ${p.date}</span>
                        </div>
                    </div>
                    <div class="post-content" style="font-family: ${p.font}; color: ${p.color}">
                        <h2>${p.title}</h2>
                        <p>${p.desc}</p>
                    </div>
                    <a href="${p.link}" target="_blank" class="link-box">
                        <i class="fas fa-external-link-alt"></i>
                        <span>Visit Link</span>
                    </a>
                </div>
            `).join('');
        }

        function logout() { localStorage.removeItem('isLoggedIn'); window.location.href = 'index.html'; }
        
        window.onclick = function(event) { if (!event.target.matches('.icon-btn, .fa-cog')) document.getElementById("myDropdown").style.display = "none"; }
        
        renderPosts();
    </script>
</body>
</html>
