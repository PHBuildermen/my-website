<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Lite site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar animate-fade">
        <div class="logo">Studio Lite site</div>
        <div class="settings-dropdown">
            <button class="icon-btn" onclick="toggleDropdown('myDropdown')"><i class="fas fa-cog"></i></button>
            <div id="myDropdown" class="dropdown-content">
                <button onclick="openProfile()"><i class="fas fa-user"></i> Profile</button>
                <button onclick="logout()" style="color: red;"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="search-container animate-fade">
            <input type="text" id="searchInput" class="search-input" placeholder="Search posts or people..." onkeyup="searchPosts()">
        </div>

        <div class="creator-card animate-fade">
            <h3>Create New Post</h3>
            <input type="text" id="postTitle" placeholder="Post Title">
            <input type="text" id="postLink" placeholder="Paste Link (URL)">
            <textarea id="postDesc" rows="3" placeholder="Description (White Font)"></textarea>
            
            <div class="custom-controls">
                <select id="privacySelect">
                    <option value="public">Public</option>
                    <option value="private">Private</option>
                </select>
                <input type="color" id="colorSelect" value="#1976d2" title="Title Color">
            </div>

            <div id="uploadLoader"><i class="fas fa-spinner fa-spin"></i> Uploading...</div>
            <button id="postBtn" class="btn-primary" onclick="submitPost()">Post to Feed</button>
            <p id="cooldownMsg" style="color: red; font-size: 0.8rem; display: none;">Wait 30s to post again.</p>
        </div>

        <div id="postFeed"></div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content scale-in">
            <h3>Account Profile</h3>
            <img id="profilePreview" src="https://via.placeholder.com/100" class="author-pic" style="width: 100px; height: 100px; border-radius: 50%;">
            <p><strong id="profName">Username</strong></p>
            <input type="file" id="imageInput" accept="image/*">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-primary" onclick="saveProfile()">Submit Change</button>
                <button onclick="closeProfile()" style="border:none; background:none;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const currentUser = localStorage.getItem('username');
        let isCooldown = false;
        let tempImg = localStorage.getItem('profileImg') || '';

        // SEARCH SYSTEM
        function searchPosts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            renderPosts(query);
        }

        // PROFILE SYSTEM
        function openProfile() {
            document.getElementById('profileModal').style.display = 'flex';
            document.getElementById('profName').innerText = currentUser;
        }

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = () => { 
                tempImg = reader.result;
                document.getElementById('profilePreview').src = tempImg;
            };
            reader.readAsDataURL(e.files[0]);
        });

        function saveProfile() {
            localStorage.setItem('profileImg', tempImg);
            alert("Profile updated successfully!");
            location.reload();
        }

        // POST SYSTEM
        function submitPost() {
            if (isCooldown) return;
            
            const title = document.getElementById('postTitle').value;
            const link = document.getElementById('postLink').value;
            const desc = document.getElementById('postDesc').value;
            const color = document.getElementById('colorSelect').value;
            const privacy = document.getElementById('privacySelect').value;

            if(!title || !link) return alert("Fill in Title and Link!");

            // Uploading Process
            document.getElementById('uploadLoader').style.display = 'block';
            document.getElementById('postBtn').disabled = true;

            setTimeout(() => {
                const posts = JSON.parse(localStorage.getItem('litePosts')) || [];
                const newPost = {
                    id: Date.now(),
                    title, link, desc, color, privacy,
                    author: currentUser,
                    authorImg: localStorage.getItem('profileImg'),
                    date: new Date().toLocaleString(),
                    likes: [],
                    comments: []
                };

                posts.push(newPost);
                localStorage.setItem('litePosts', JSON.stringify(posts));

                // Reset Inputs
                document.getElementById('postTitle').value = '';
                document.getElementById('postLink').value = '';
                document.getElementById('postDesc').value = '';
                document.getElementById('uploadLoader').style.display = 'none';

                // Start Cooldown
                startCooldown();
                renderPosts();
            }, 1500);
        }

        function startCooldown() {
            isCooldown = true;
            document.getElementById('cooldownMsg').style.display = 'block';
            let timer = 30;
            const interval = setInterval(() => {
                timer--;
                if(timer <= 0) {
                    clearInterval(interval);
                    isCooldown = false;
                    document.getElementById('postBtn').disabled = false;
                    document.getElementById('cooldownMsg').style.display = 'none';
                }
            }, 1000);
        }

        function renderPosts(filter = '') {
            const feed = document.getElementById('postFeed');
            const posts = JSON.parse(localStorage.getItem('litePosts')) || [];
            
            const filteredPosts = posts.filter(p => 
                (p.privacy === 'public' || p.author === currentUser) &&
                (p.title.toLowerCase().includes(filter) || p.author.toLowerCase().includes(filter))
            ).reverse();

            feed.innerHTML = filteredPosts.map(p => `
                <div class="post-card">
                    <div class="config-menu">
                        <button onclick="toggleDropdown('drop-${p.id}')"><i class="fas fa-ellipsis-v"></i></button>
                        <div id="drop-${p.id}" class="dropdown-menu">
                            <button onclick="alert('Edit coming soon')">Edit</button>
                            <button onclick="deletePost(${p.id})" style="color:red">Delete</button>
                            <button onclick="alert('Reported!')">Report</button>
                        </div>
                    </div>
                    <div class="post-header">
                        <img src="${p.authorImg || 'https://via.placeholder.com/40'}" class="author-pic">
                        <div class="author-info">
                            <h4>${p.author}</h4>
                            <span>${p.date} • ${p.privacy}</span>
                        </div>
                    </div>
                    <div class="post-content">
                        <h2 style="color: ${p.color}">${p.title}</h2>
                        <p style="color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;">${p.desc}</p>
                    </div>
                    <a href="${p.link}" target="_blank" class="link-box"><i class="fas fa-link"></i> Visit Link</a>
                    
                    <div class="likes-info">
                        <button onclick="toggleLike(${p.id})"><i class="fa${p.likes.includes(currentUser) ? 's' : 'r'} fa-heart" style="color:red"></i></button>
                        ${p.likes.length} likes (${p.likes.join(', ')})
                    </div>

                    <div class="comment-section">
                        <div id="comments-${p.id}">
                            ${p.comments.map(c => `<div class="comment"><b>${c.user}:</b> ${c.text}</div>`).join('')}
                        </div>
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            <input type="text" id="input-${p.id}" placeholder="Write a comment..." style="padding:5px;">
                            <button onclick="addComment(${p.id})" class="btn-primary" style="width:auto; padding:5px 10px;">Send</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // INTERACTIONS
        function toggleLike(id) {
            let posts = JSON.parse(localStorage.getItem('litePosts'));
            const post = posts.find(p => p.id === id);
            if(post.likes.includes(currentUser)) {
                post.likes = post.likes.filter(u => u !== currentUser);
            } else {
                post.likes.push(currentUser);
            }
            localStorage.setItem('litePosts', JSON.stringify(posts));
            renderPosts();
        }

        function addComment(id) {
            const text = document.getElementById(`input-${id}`).value;
            if(!text) return;
            let posts = JSON.parse(localStorage.getItem('litePosts'));
            posts.find(p => p.id === id).comments.push({ user: currentUser, text });
            localStorage.setItem('litePosts', JSON.stringify(posts));
            renderPosts();
        }

        function deletePost(id) {
            let posts = JSON.parse(localStorage.getItem('litePosts'));
            posts = posts.filter(p => p.id !== id);
            localStorage.setItem('litePosts', JSON.stringify(posts));
            renderPosts();
        }

        function toggleDropdown(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function logout() { localStorage.removeItem('isLoggedIn'); window.location.href = 'index.html'; }
        
        renderPosts();
    </script>
</body>
</html>
