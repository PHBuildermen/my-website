<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
<h3>Studio Lite</h3>
<button onclick="logout()">Logout</button>
</div>

<!-- HOME -->
<div id="home">
<div id="feed"></div>
</div>

<!-- PROFILE -->
<div id="profile" style="display:none;">
<h2 id="pName"></h2>
<p id="pStats"></p>
<button onclick="editProfile()">Edit</button>
</div>

<!-- UPLOAD -->
<div id="upload" style="display:none;">
<input id="title" placeholder="Title">
<input id="file" type="file">
<button onclick="upload()">Upload</button>
</div>

<div class="bottom">
<button onclick="show('home')">Home</button>
<button onclick="show('upload')">Upload</button>
<button onclick="show('profile')">Profile</button>
</div>

<script>
const DB_KEY = "studio_db";
const USER_KEY = "currentUserId";
const POSTS = "all_posts";
const REELS = "all_reels";

function getDB(){
  return JSON.parse(localStorage.getItem(DB_KEY)) || [];
}
function setDB(db){
  localStorage.setItem(DB_KEY, JSON.stringify(db));
}

function getUser(){
  let id = localStorage.getItem(USER_KEY);
  return getDB().find(u => u.id == id);
}

let user = getUser();
if(!user) location.href="index.html";

function show(v){
  home.style.display = v==="home"?"block":"none";
  upload.style.display = v==="upload"?"block":"none";
  profile.style.display = v==="profile"?"block":"none";
  if(v==="profile") loadProfile();
}

function loadProfile(){
  pName.innerText = user.username;
  let posts = JSON.parse(localStorage.getItem(POSTS)) || [];
  let my = posts.filter(p => p.authorId == user.id);
  pStats.innerText = "Posts: " + my.length;
}

function upload(){
  let file = document.getElementById("file").files[0];
  let title = document.getElementById("title").value;

  if(!file || !title) return alert("Missing");

  let reader = new FileReader();
  reader.onload = e => {
    let posts = JSON.parse(localStorage.getItem(POSTS)) || [];

    posts.push({
      id: Date.now(),
      author: user.username,
      authorId: user.id,
      title,
      data: e.target.result
    });

    localStorage.setItem(POSTS, JSON.stringify(posts));
    alert("Uploaded!");
    location.reload();
  };

  reader.readAsDataURL(file);
}

function loadFeed(){
  let posts = JSON.parse(localStorage.getItem(POSTS)) || [];
  feed.innerHTML = [...posts].reverse().map(p => `
    <div class="card">
      <b>${p.author}</b>
      <p>${p.title}</p>
      <img src="${p.data}">
    </div>
  `).join("");
}

function editProfile(){
  let newName = prompt("New username:", user.username);
  if(!newName) return;

  let db = getDB();
  let i = db.findIndex(u => u.id == user.id);
  db[i].username = newName;

  setDB(db);
  user = db[i];

  alert("Updated");
  location.reload();
}

function logout(){
  localStorage.removeItem(USER_KEY);
  location.href="index.html";
}

loadFeed();
</script>

</body>
</html>
