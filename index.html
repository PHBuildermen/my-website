<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Lite site - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div class="creator-card" style="width: 350px;">
        <h1 style="text-align: center; color: #1976d2;">Studio Lite site</h1>
        <p style="text-align: center; color: #666;">Welcome back! Please login.</p>
        <form id="loginForm">
            <input type="text" id="loginUser" placeholder="Username" required style="margin-bottom: 10px;">
            <input type="password" id="loginPass" placeholder="Password" required style="margin-bottom: 20px;">
            <button type="submit" class="btn-primary">Login</button>
        </form>
        <p style="text-align: center; font-size: 0.9rem; margin-top: 15px;">
            New here? <a href="register.html" style="color: #1976d2;">Create Account</a>
        </p>
    </div>

    <script>
        if (localStorage.getItem('isLoggedIn') === 'true') window.location.href = 'dashboard.html';

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            if (user === localStorage.getItem('username') && pass === localStorage.getItem('password')) {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid credentials!');
            }
        });
    </script>
</body>
</html>
