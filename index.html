<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Lite - Auth</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="center">

<div class="card">

<h1 class="title">Studio Lite</h1>

<!-- LOGIN -->
<div id="loginForm">
<input id="lUser" placeholder="Username">
<input id="lPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p onclick="swap()">No account? Register</p>
</div>

<!-- REGISTER -->
<div id="regForm" style="display:none;">
<input id="rUser" placeholder="Username">
<input id="rPass" type="password" placeholder="Password">
<button onclick="register()">Create Account</button>
<p onclick="swap()">Back to Login</p>
</div>

</div>

<script>
const DB_KEY = "studio_db";
const USER_KEY = "currentUserId";

function getDB(){
  return JSON.parse(localStorage.getItem(DB_KEY)) || [];
}
function setDB(db){
  localStorage.setItem(DB_KEY, JSON.stringify(db));
}

function swap(){
  loginForm.style.display = loginForm.style.display === "none" ? "block" : "none";
  regForm.style.display = regForm.style.display === "none" ? "block" : "none";
}

function register(){
  let db = getDB();
  let u = rUser.value.trim();
  let p = rPass.value;

  if(!u || !p) return alert("Fill all fields");

  if(db.some(x => x.username.toLowerCase() === u.toLowerCase()))
    return alert("Username taken");

  db.push({
    id: Date.now(),
    username: u,
    password: p,
    followers: 0,
    friends: 0,
    verified: false
  });

  setDB(db);
  alert("Account created!");
  swap();
}

function login(){
  let db = getDB();
  let u = lUser.value.trim();
  let p = lPass.value;

  let user = db.find(x =>
    x.username.toLowerCase() === u.toLowerCase() &&
    x.password === p
  );

  if(!user) return alert("Wrong credentials");

  localStorage.setItem(USER_KEY, user.id);
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
